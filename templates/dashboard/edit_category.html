{% extends "base.html" %}

{% block content %}
{% load crispy_forms_tags %}

    <div class="row">
        <!-- left side bar-->
            {% include "dashboard/sidebar.html" %}

        <!-- right side content-->
            <div class="col-md-9">
                <h2>Edit Category</h2>

                <form action="{% url 'edit_categories' category.id%}" method="POST" style="width: 500px;">
                    {% csrf_token %}
                    {{form|crispy}}

                    <button type="Submit" class="btn btn-warning">Submit</button>
                </form>
                <br>
            </div>
    </div>


{% endblock content %}
